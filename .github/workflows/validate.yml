name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shell Script Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all scripts
        run: |
          shellcheck -x scripts/*.sh
        continue-on-error: false

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint Kubernetes manifests
        run: |
          yamllint -d relaxed k8s/*.yaml
        continue-on-error: false

      - name: Lint Falco rule files
        run: |
          yamllint -d relaxed falco/*.yaml
        continue-on-error: false

  falco-rule-validation:
    name: Falco Rule Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate Falco custom rules structure
        run: |
          python3 << 'EOF'
          import yaml
          import sys

          REQUIRED_FIELDS = {"rule", "desc", "condition", "output", "priority"}
          VALID_PRIORITIES = {"EMERGENCY", "ALERT", "CRITICAL", "ERROR", "WARNING", "NOTICE", "INFORMATIONAL", "DEBUG"}

          errors = 0
          with open("falco/custom-rules.yaml") as f:
              rules = list(yaml.safe_load_all(f))

          # yaml.safe_load_all returns one document; for a list of rules it's a single list
          if len(rules) == 1 and isinstance(rules[0], list):
              rules = rules[0]

          for i, rule in enumerate(rules):
              if not isinstance(rule, dict):
                  print(f"  ERROR: Rule {i} is not a dict")
                  errors += 1
                  continue

              name = rule.get("rule", f"<unnamed rule {i}>")
              print(f"Validating: {name}")

              missing = REQUIRED_FIELDS - set(rule.keys())
              if missing:
                  print(f"  ERROR: Missing fields: {missing}")
                  errors += 1

              priority = rule.get("priority", "").upper()
              if priority and priority not in VALID_PRIORITIES:
                  print(f"  ERROR: Invalid priority '{priority}' (must be one of {VALID_PRIORITIES})")
                  errors += 1

              if "tags" in rule and not isinstance(rule["tags"], list):
                  print(f"  ERROR: 'tags' must be a list")
                  errors += 1

          if errors:
              print(f"\n✗ {errors} rule(s) failed validation")
              sys.exit(1)
          print(f"\n✓ All {len(rules)} custom rules have valid structure")
          EOF
        continue-on-error: false

  docker-lint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install hadolint
        run: |
          wget -q -O /tmp/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint
          sudo mv /tmp/hadolint /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          echo "Checking Dockerfile syntax and best practices..."
          hadolint apps/arena-security-api/Dockerfile || true
          hadolint apps/rogue-player/Dockerfile || true
          hadolint apps/alert-dashboard/Dockerfile || true
          echo "✓ Dockerfile check complete"
        continue-on-error: true

  docs-check:
    name: Documentation Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required docs exist
        run: |
          files=(
            "README.md"
            "LICENSE"
            ".gitignore"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "SECURITY.md"
            "TROUBLESHOOTING.md"
            "CLAUDE.md"
          )
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing: $file"
              exit 1
            fi
          done
          echo "All required documentation files present"

  script-syntax:
    name: Script Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check bash syntax
        run: |
          for script in scripts/*.sh; do
            echo "Checking $script"
            bash -n "$script"
          done

  python-lint:
    name: Python Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: pip install flake8 black

      - name: Check Python syntax
        run: |
          python -m py_compile apps/arena-security-api/app.py
          python -m py_compile apps/rogue-player/app.py
          python -m py_compile apps/alert-dashboard/app.py

      - name: Run flake8
        run: |
          flake8 apps/ --max-line-length=100
        continue-on-error: true

      - name: Check code formatting with black
        run: black --check apps/
        continue-on-error: true

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: nosborn/github-action-markdown-cli@v3.5.0
        with:
          files: .
          config_file: .markdownlint.json
        continue-on-error: true
